<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1877f2">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <title>LLEY-OPERACIONES · Admin</title>
  <style>
    :root {
      --bg:#f0f2f5;--surface:#fff;--sur2:#e4e6eb;--border:#dddfe2;
      --accent:#1877f2;--acc-g:linear-gradient(135deg,#2196f3,#0d47a1);
      --adim:rgba(24,119,242,.10);--text:#050505;--sub:#444950;--muted:#8a8d91;
      --danger:#fa383e;--sh:0 1px 3px rgba(0,0,0,.12);
      --font:'Plus Jakarta Sans',system-ui,sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;-webkit-font-smoothing:antialiased}

    /* ── LOGIN ── */
    .login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
    .login-card{background:var(--surface);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.12);padding:36px 28px;width:100%;max-width:360px}
    .login-logo{width:48px;height:48px;border-radius:12px;background:var(--acc-g);display:flex;align-items:center;justify-content:center;color:#fff;font-size:24px;font-weight:800;margin:0 auto 18px}
    .login-brand{font-size:17px;font-weight:800;text-align:center;color:var(--text);margin-bottom:4px}
    .login-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:28px}
    .login-lbl{display:block;font-size:12px;font-weight:700;color:var(--sub);margin-bottom:7px}
    .login-inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:12px 14px;font-family:var(--font);font-size:15px;color:var(--text);outline:none;margin-bottom:16px;-webkit-appearance:none}
    .login-inp:focus{border-color:var(--accent)}
    .login-btn{width:100%;padding:13px;background:var(--acc-g);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 2px 10px rgba(24,119,242,.35)}
    .login-btn:active{opacity:.88}
    .login-err{font-size:12px;color:var(--danger);text-align:center;margin-top:12px;display:none}
    .login-err.show{display:block}

    /* ── MAIN ── */
    .main{display:none}
    .main.show{display:block}

    /* TOPNAV */
    .topnav{background:var(--surface);border-bottom:1px solid var(--border);box-shadow:var(--sh);position:sticky;top:0;z-index:100}
    .topnav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;max-width:1100px;margin:0 auto}
    .brand{display:flex;align-items:center;gap:10px}
    .brand-ico{width:36px;height:36px;border-radius:9px;background:var(--acc-g);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;font-weight:800;flex-shrink:0}
    .brand-name{font-size:15px;font-weight:800;color:var(--text);line-height:1.1}
    .brand-sub{font-size:10px;color:var(--muted);font-weight:500}
    .nav-right{display:flex;gap:10px;align-items:center}
    .badge{background:var(--adim);color:var(--accent);border:1px solid rgba(24,119,242,.2);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:700}
    .btn-logout{background:var(--sur2);border:none;border-radius:8px;padding:7px 14px;font-family:var(--font);font-size:12px;font-weight:700;color:var(--sub);cursor:pointer}

    /* CONTENT */
    .content{max-width:1100px;margin:0 auto;padding:20px}

    /* STAT CARDS */
    .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:24px}
    .stat-card{background:var(--surface);border-radius:12px;box-shadow:var(--sh);padding:16px;border-left:4px solid var(--accent)}
    .stat-emo{font-size:22px;margin-bottom:4px}
    .stat-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
    .stat-val{font-size:24px;font-weight:800;color:var(--text);margin-top:2px}

    /* TOOLBAR */
    .toolbar{background:var(--surface);border-radius:12px;box-shadow:var(--sh);padding:14px 16px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .tb-inp{flex:1;min-width:180px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 12px;font-family:var(--font);font-size:13px;color:var(--text);outline:none}
    .tb-inp:focus{border-color:var(--accent)}
    .tb-select{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 10px;font-family:var(--font);font-size:13px;color:var(--text);outline:none;cursor:pointer}
    .tb-btn{padding:8px 14px;border-radius:8px;font-family:var(--font);font-size:12px;font-weight:700;cursor:pointer;border:none;white-space:nowrap}
    .tb-btn-primary{background:var(--acc-g);color:#fff}
    .tb-btn-sec{background:var(--sur2);color:var(--sub)}
    .tb-count{font-size:12px;color:var(--muted);font-weight:500;margin-left:auto}

    /* TABLE */
    .table-wrap{background:var(--surface);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th{background:#f8f9ff;padding:10px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1.5px solid var(--border);white-space:nowrap}
    .tbl td{padding:11px 14px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--text)}
    .tbl tr:last-child td{border-bottom:none}
    .tbl tr:hover td{background:#f8f9ff}
    .cat-badge{display:inline-block;padding:2px 9px;border-radius:5px;background:var(--adim);color:var(--accent);font-size:11px;font-weight:700;border:1px solid rgba(24,119,242,.18);white-space:nowrap}
    .tag-sm{display:inline-block;padding:1px 6px;border-radius:3px;background:var(--sur2);color:var(--sub);font-size:10.5px;margin:1px 2px 1px 0;font-weight:600}
    .txt-preview{color:var(--sub);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .txt-date{font-size:11.5px;color:var(--muted);white-space:nowrap}
    .expand-row{display:none;background:#f8f9ff}
    .expand-row.open{display:table-row}
    .expand-cell{padding:12px 14px 16px;border-bottom:1px solid var(--border)}
    .expand-txt{font-size:13px;color:var(--sub);line-height:1.7;white-space:pre-wrap;max-width:700px}
    .btn-expand{background:none;border:none;color:var(--accent);cursor:pointer;font-size:11px;font-weight:700;padding:0}
    .btn-del-row{background:none;border:none;color:var(--danger);cursor:pointer;font-size:12px;font-weight:700;padding:2px 6px;border-radius:5px;opacity:.7}
    .btn-del-row:hover{opacity:1;background:rgba(250,56,62,.08)}

    /* EMPTY */
    .empty-row td{text-align:center;padding:40px;color:var(--muted);font-size:14px}

    /* LOADING */
    .loading{text-align:center;padding:48px;color:var(--muted);font-size:14px}

    /* TOAST */
    .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-10px);background:#333;color:#fff;border-radius:20px;padding:9px 18px;font-size:13px;font-weight:600;z-index:600;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;pointer-events:none}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* REFRESH INDICATOR */
    .sync-dot{width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:6px}
    .sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

    @media(max-width:600px){
      .content{padding:12px}
      .stat-row{grid-template-columns:repeat(2,1fr)}
      .tbl th:nth-child(4),.tbl td:nth-child(4),
      .tbl th:nth-child(5),.tbl td:nth-child(5){display:none}
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-wrap">
  <div class="login-card">
    <div class="login-logo">L</div>
    <div class="login-brand">LLEY-OPERACIONES</div>
    <div class="login-sub">Panel de Administración · Bitácora</div>
    <label class="login-lbl">Contraseña de acceso</label>
    <input class="login-inp" type="password" id="pass-inp" placeholder="Contraseña..." autocomplete="current-password">
    <button class="login-btn" id="btn-login">Entrar →</button>
    <div class="login-err" id="login-err">Contraseña incorrecta. Intenta de nuevo.</div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <nav class="topnav">
    <div class="topnav-inner">
      <div class="brand">
        <div class="brand-ico">L</div>
        <div>
          <div class="brand-name">LLEY-OPERACIONES</div>
          <div class="brand-sub">Panel Admin · Bitácora</div>
        </div>
      </div>
      <div class="nav-right">
        <span class="badge"><span class="sync-dot" id="sync-dot"></span><span id="record-count">—</span> registros</span>
        <button class="tb-btn tb-btn-primary" onclick="loadRecords()">↻ Actualizar</button>
        <button class="btn-logout" onclick="logout()">Salir</button>
      </div>
    </div>
  </nav>

  <div class="content">
    <!-- Stats -->
    <div class="stat-row" id="stat-row">
      <div class="stat-card"><div class="stat-emo">📝</div><div class="stat-lbl">Total registros</div><div class="stat-val" id="st-total">—</div></div>
      <div class="stat-card"><div class="stat-emo">📅</div><div class="stat-lbl">Hoy</div><div class="stat-val" id="st-today">—</div></div>
      <div class="stat-card"><div class="stat-emo">📆</div><div class="stat-lbl">Esta semana</div><div class="stat-val" id="st-week">—</div></div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <input class="tb-inp" type="search" id="search-admin" placeholder="🔍  Buscar por título, anotación, categoría...">
      <select class="tb-select" id="filter-cat">
        <option value="">Todas las categorías</option>
      </select>
      <select class="tb-select" id="filter-area">
        <option value="">Todas las áreas</option>
      </select>
      <input class="tb-inp" type="date" id="filter-from" style="max-width:150px" title="Desde">
      <input class="tb-inp" type="date" id="filter-to" style="max-width:150px" title="Hasta">
      <button class="tb-btn tb-btn-sec" onclick="clearFilters()">Limpiar</button>
      <button class="tb-btn tb-btn-primary" onclick="exportCSV()">⬇ CSV</button>
      <span class="tb-count" id="visible-count"></span>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <div class="loading" id="loading">Cargando registros...</div>
      <table class="tbl" id="main-table" style="display:none">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Categoría</th>
            <th>Área</th>
            <th>Título</th>
            <th>Anotación</th>
            <th>Etiquetas</th>
            <th>📷</th>
            <th>Usuario</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIGURACIÓN ──────────────────────────────────────────
// ⚠️ Reemplaza esta URL con la tuya de Google Apps Script
const SCRIPT_URL = 'TU_URL_DE_APPS_SCRIPT_AQUI';

// ── STATE ──────────────────────────────────────────────────
let adminPass = '';
let allRecords = [];

// ── UTILS ──────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function toast(msg, ms=2500) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function fmtDate(s) {
  if (!s) return '—';
  try {
    const d = new Date(s);
    if (isNaN(d)) return s; // already formatted string
    return d.toLocaleDateString('es-MX', {day:'2-digit',month:'short',year:'numeric'})
      + ' ' + d.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  } catch { return s; }
}

// ── LOGIN ──────────────────────────────────────────────────
async function doLogin() {
  const pass = $('pass-inp').value.trim();
  if (!pass) return;
  if (!SCRIPT_URL || SCRIPT_URL === 'TU_URL_DE_APPS_SCRIPT_AQUI') {
    // Demo mode sin script configurado
    adminPass = pass;
    showMain();
    return;
  }
  try {
    const r = await fetch(`${SCRIPT_URL}?action=auth&pass=${encodeURIComponent(pass)}`);
    const d = await r.json();
    if (d.ok) { adminPass = pass; showMain(); }
    else { $('login-err').classList.add('show'); }
  } catch {
    $('login-err').textContent = 'Error de conexión. Verifica la URL del script.';
    $('login-err').classList.add('show');
  }
}
$('btn-login').addEventListener('click', doLogin);
$('pass-inp').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() });

function showMain() {
  $('login-wrap').style.display = 'none';
  $('main').classList.add('show');
  loadRecords();
}
function logout() { location.reload() }

// ── LOAD RECORDS ───────────────────────────────────────────
async function loadRecords() {
  $('sync-dot').classList.add('syncing');
  $('loading').style.display = 'block';
  $('main-table').style.display = 'none';

  try {
    if (!SCRIPT_URL || SCRIPT_URL === 'TU_URL_DE_APPS_SCRIPT_AQUI') {
      // Demo data
      allRecords = generateDemoData();
    } else {
      const r = await fetch(`${SCRIPT_URL}?action=getAll&pass=${encodeURIComponent(adminPass)}`);
      const d = await r.json();
      if (!d.ok) throw new Error(d.error);
      allRecords = d.records || [];
    }
    buildCatFilter();
    renderTable();
    updateStats();
  } catch (err) {
    $('loading').textContent = `Error: ${err.message}`;
  } finally {
    $('sync-dot').classList.remove('syncing');
  }
}

function generateDemoData() {
  const cats = ['Incidencias en bodega', 'Retorno de material', 'Mermas'];
  const titles = ['Revisión de inventario','Faltante detectado','Devolución cliente','Material dañado','Conteo de merma'];
  const users = ['Juan López','María García','Carlos Ruiz','Ana Torres'];
  const data = [];
  for (let i = 0; i < 15; i++) {
    const d = new Date(); d.setDate(d.getDate() - Math.floor(Math.random() * 14));
    data.push({
      id: 'demo-' + i,
      createdAt: d.toISOString(),
      category: cats[i % cats.length],
      title: titles[i % titles.length] + ' #' + (i+1),
      text: 'Anotación de ejemplo para este registro de bitácora. Se detectó una situación que requiere seguimiento.',
      tags: ['turno-' + (i%3+1), i%2===0?'urgente':'normal'],
      photoCount: Math.floor(Math.random() * 4),
      user: users[i % users.length],
    });
  }
  return data.reverse();
}

// ── FILTERS ────────────────────────────────────────────────
function buildCatFilter() {
  const sel = $('filter-cat');
  const cats = [...new Set(allRecords.map(r => r.category).filter(Boolean))];
  sel.innerHTML = '<option value="">Todas las categorías</option>';
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o) });
  const asel = $('filter-area');
  const areas = [...new Set(allRecords.map(r => r.area).filter(Boolean))];
  asel.innerHTML = '<option value="">Todas las áreas</option>';
  areas.forEach(a => { const o = document.createElement('option'); o.value = a; o.textContent = a; asel.appendChild(o) });
}

function getVisible() {
  const q    = $('search-admin').value.toLowerCase();
  const cat  = $('filter-cat').value;
  const area = $('filter-area').value;
  const from = $('filter-from').value ? new Date($('filter-from').value) : null;
  const to   = $('filter-to').value ? new Date($('filter-to').value + 'T23:59:59') : null;

  return allRecords.filter(r => {
    if (cat  && r.category !== cat)  return false;
    if (area && r.area     !== area) return false;
    if (q && ![(r.title||''),(r.text||''),(r.category||''),(r.area||''),(r.user||'')].some(s => s.toLowerCase().includes(q))) return false;
    if (from || to) {
      const d = new Date(r.createdAt);
      if (from && d < from) return false;
      if (to && d > to) return false;
    }
    return true;
  });
}

['search-admin','filter-cat','filter-area','filter-from','filter-to'].forEach(id => {
  $(id)?.addEventListener('input',  () => renderTable());
  $(id)?.addEventListener('change', () => renderTable());
});

function clearFilters() {
  $('search-admin').value = '';
  $('filter-cat').value = '';
  $('filter-area').value = '';
  $('filter-from').value = '';
  $('filter-to').value = '';
  renderTable();
}

// ── RENDER TABLE ───────────────────────────────────────────
function renderTable() {
  const visible = getVisible();
  $('record-count').textContent = allRecords.length;
  $('visible-count').textContent = visible.length !== allRecords.length ? `${visible.length} de ${allRecords.length} registros` : `${visible.length} registros`;

  const body = $('tbl-body');
  $('loading').style.display = 'none';
  $('main-table').style.display = 'table';

  if (!visible.length) {
    body.innerHTML = `<tr class="empty-row"><td colspan="8">Sin registros con los filtros actuales.</td></tr>`;
    return;
  }

  body.innerHTML = visible.map((r, i) => `
    <tr data-id="${esc(r.id)}" style="cursor:pointer" onclick="toggleRow('${esc(r.id)}')">
      <td class="txt-date">${fmtDate(r.createdAt)}</td>
      <td><span class="cat-badge">${esc(r.category)}</span></td>
      <td style="font-size:12px;color:var(--muted)">${esc(r.area||'—')}</td>
      <td style="font-weight:600;max-width:140px">${esc(r.title)}</td>
      <td><div class="txt-preview">${esc(r.text)}</div></td>
      <td>${(r.tags||[]).map(t=>`<span class="tag-sm">${esc(t)}</span>`).join('')}</td>
      <td style="text-align:center;color:var(--muted)">${r.photoCount>0?`📷${r.photoCount}`:'—'}</td>
      <td style="color:var(--muted);font-size:12px">${esc(r.user||'—')}</td>
      <td><button class="btn-del-row" onclick="event.stopPropagation();deleteRecord('${esc(r.id)}')">🗑</button></td>
    </tr>
    <tr class="expand-row" id="expand-${esc(r.id)}">
      <td class="expand-cell" colspan="9">
        <div class="expand-txt">${r.text ? esc(r.text) : '<em style="color:var(--muted)">Sin anotación.</em>'}</div>
        ${r.photoCount>0?`<div style="margin-top:8px;font-size:12px;color:var(--muted)">📷 ${r.photoCount} foto(s) — las fotos solo se ven en el dispositivo del trabajador.</div>`:''}
      </td>
    </tr>`).join('');
}

function toggleRow(id) {
  const row = $('expand-' + id);
  if (row) row.classList.toggle('open');
}

// ── STATS ──────────────────────────────────────────────────
function updateStats() {
  $('st-total').textContent = allRecords.length;
  const today = new Date(); today.setHours(0,0,0,0);
  const week  = new Date(); week.setDate(week.getDate() - 7); week.setHours(0,0,0,0);
  $('st-today').textContent = allRecords.filter(r => new Date(r.createdAt) >= today).length;
  $('st-week').textContent  = allRecords.filter(r => new Date(r.createdAt) >= week).length;
}

// ── DELETE ─────────────────────────────────────────────────
async function deleteRecord(id) {
  if (!confirm('¿Eliminar este registro permanentemente?')) return;
  if (SCRIPT_URL && SCRIPT_URL !== 'TU_URL_DE_APPS_SCRIPT_AQUI') {
    try {
      const r = await fetch(SCRIPT_URL, {
        method:'POST', body: JSON.stringify({action:'deleteRecord', id}),
        headers:{'Content-Type':'application/json'}
      });
      const d = await r.json();
      if (!d.ok) { toast('⚠️ Error al eliminar: ' + d.error); return; }
    } catch { toast('⚠️ Error de conexión'); return; }
  }
  allRecords = allRecords.filter(r => r.id !== id);
  renderTable(); updateStats();
  toast('🗑 Registro eliminado');
}

// ── CSV EXPORT ─────────────────────────────────────────────
function exportCSV() {
  const visible = getVisible();
  if (!visible.length) { toast('Sin registros para exportar'); return; }
  const headers = ['ID','Fecha','Categoría','Área','Título','Anotación','Etiquetas','Fotos','Usuario'];
  const rows = visible.map(r => [
    r.id, r.createdAt, r.category, r.area||'', r.title,
    (r.text||'').replace(/\n/g,' '), (r.tags||[]).join(' | '),
    r.photoCount||0, r.user||''
  ]);
  const csv = [headers, ...rows]
    .map(row => row.map(c => `"${String(c||'').replace(/"/g,'""')}"`).join(','))
    .join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = `LLEY-admin_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  toast('✓ CSV descargado');
}
</script>
</body>
</html>
